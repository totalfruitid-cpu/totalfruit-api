<script>
fetch("https://totalfruit-api-production.up.railway.app/order", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    name: "Test Order",
    menu: "Dragon Fruit",
    qty: 1
  })
})
.then(res => res.json())
.then(data => alert("Sukses: " + JSON.stringify(data)))
.catch(err => alert("Error: " + err));
</script>
